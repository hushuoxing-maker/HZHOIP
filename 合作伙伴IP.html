<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>合作伙伴 · 品牌IP形象生成器-古月AI智能体</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Microsoft YaHei";
}

body{

padding:40px;

background:linear-gradient(135deg,#0f2027,#203a43,#2c5364,#6c63ff);
background-size:400% 400%;
animation:bgmove 18s infinite;

color:white;

}

@keyframes bgmove{

0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}

}

.container{
max-width:1200px;
margin:auto;
}

.title{

font-size:34px;
font-weight:800;
text-align:center;
margin-bottom:40px;

background:linear-gradient(90deg,#ffffff,#8be9ff);
-webkit-background-clip:text;
color:transparent;

}

.panel{

background:rgba(255,255,255,0.1);
backdrop-filter:blur(18px);

padding:30px;

border-radius:16px;

box-shadow:0 20px 40px rgba(0,0,0,0.4);

margin-bottom:40px;

}

input{

width:100%;
padding:14px;

border-radius:10px;

border:none;

margin-top:10px;
margin-bottom:20px;

font-size:15px;

}

button{

width:100%;
padding:14px;

border:none;
border-radius:10px;

font-size:16px;
font-weight:700;

cursor:pointer;

background:linear-gradient(135deg,#6c63ff,#00c9a7);
color:white;

}

.results{

display:grid;
grid-template-columns:repeat(auto-fill,minmax(420px,1fr));
gap:20px;

}

.card{

background:rgba(255,255,255,0.12);
backdrop-filter:blur(10px);

padding:20px;

border-radius:14px;

box-shadow:0 10px 25px rgba(0,0,0,0.3);

}

.cardTitle{

font-weight:700;
margin-bottom:10px;
color:#8be9ff;

}

.prompt{

white-space:pre-wrap;
line-height:1.6;
font-size:14px;

}

.copy{

margin-top:12px;

padding:8px 14px;

border:none;
border-radius:8px;

background:#6c63ff;

color:white;

cursor:pointer;

}

</style>

</head>

<body>

<div class="container">

<div class="title">
合作伙伴 · 品牌IP形象生成器-古月AI智能体
</div>

<div class="panel">

输入品牌IP名称：

<input id="name" placeholder="例如：星链猫">

输入品牌行业：

<input id="industry" placeholder="例如：互联网科技 / 咖啡品牌 / 金融服务">

<button onclick="create()">生成20组IP设计方案</button>

</div>

<div id="list" class="results"></div>

</div>


<script>

function rand(arr){
return arr[Math.floor(Math.random()*arr.length)]
}

const animals=[
"猫","狐狸","小熊","小鹿","企鹅","柴犬","小龙","松鼠","机器人","小狮子"
]

const personality=[
"聪明活跃","温暖亲和","勇敢探索","沉稳可靠","活泼可爱","科技理性","年轻潮流"
]

const clothes=[
"科技连帽外套","宇航服","运动卫衣","商务西装","探险背带裤",
"飞行员夹克","实验室白大褂","街头潮流夹克","未来战术服","骑士盔甲风格服装"
]

const accessory=[
"智能护目镜","耳机","科技背包","徽章","能量核心","围巾","腕表","机械手套","科技手环"
]

const symbol=[
"胸口品牌LOGO徽章","能量核心LOGO","肩章品牌标志","发光品牌图腾","品牌字母符号"
]

const color=[
"蓝紫科技渐变","红金品牌配色","黑金高级配色","橙黄活力配色","青蓝互联网色","紫粉潮流配色"
]

function create(){

let name=document.getElementById("name").value
let industry=document.getElementById("industry").value

if(name==""||industry==""){
alert("请输入完整信息")
return
}

let list=document.getElementById("list")
list.innerHTML=""

for(let i=1;i<=20;i++){

let prompt=

`品牌IP名称：${name}
行业：${industry}

IP设定：${rand(animals)}角色IP

角色气质：${rand(personality)}

服装设计：${rand(clothes)}

配饰设计：${rand(accessory)}

品牌符号：${rand(symbol)}

配色系统：${rand(color)}

品牌IP核心定义为品牌具象符号化，承载品牌理念与价值观，用于品牌识别与情感连接。

画面结构：

第一排
C4D OC渲染彩色三视图（正面、侧面、背面）

第二排
彩色矢量插画三视图（正面、侧面、背面）

第三排
黑白线稿三视图（正面、侧面、背面）

三排造型保持完全一致，比例统一，背景纯色或轻纹理，突出IP主体，高质量商业IP设计效果图，适用于即梦AI生成。`

let card=document.createElement("div")

card.className="card"

card.innerHTML=`
<div class="cardTitle">IP设计方案 ${i}</div>
<div class="prompt">${prompt}</div>
<button class="copy" onclick="copy(this)">复制提示词</button>
`

list.appendChild(card)

}

}

function copy(btn){

let text=btn.previousElementSibling.innerText

navigator.clipboard.writeText(text)

btn.innerText="已复制"

setTimeout(()=>{
btn.innerText="复制提示词"
},1500)

}

</script>

</body>

</html>
